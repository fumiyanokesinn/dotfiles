background_image ~/.config/kitty/backgrounds/ukiyoe.jpg

# 拡大
background_image_layout scaled

# 背景はかなり薄めに
background_image_opacity 0.22

# 全体を少し暗くして文字を浮かせる
background_tint 0.85

# ベース背景色（和紙×夜寄り）
background #0e1418