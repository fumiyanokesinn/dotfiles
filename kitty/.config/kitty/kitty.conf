# ===== 基本 =====
shell /opt/homebrew/bin/fish
font_family      JetBrainsMono Nerd Font
font_size        14.0

adjust_line_height 110%
adjust_column_width 100%

# ===== 見た目 =====
background_opacity 0.92
dynamic_background_opacity yes

enable_audio_bell no
visual_bell_duration 0.0

cursor_shape beam
cursor_blink_interval 0
cursor_beam_thickness 1.5

# ===== タブバー =====
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

tab_title_template "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

tab_bar_min_tabs 1
tab_bar_margin_width 6
tab_bar_margin_height 4 4

# ===== スクロール =====
scrollback_lines 20000
wheel_scroll_multiplier 4.0
touch_scroll_multiplier 1.0

# ===== コピー =====
copy_on_select yes
clipboard_control write-clipboard write-primary

# ===== パフォーマンス =====
repaint_delay 6
input_delay 1
sync_to_monitor yes
enable_ligatures always

# ===== レイアウト =====
enabled_layouts splits
window_margin_width 6
window_padding_width 6

# ===== キーバインド =====
# 新しいタブ
map cmd+t new_tab

# 分割
map cmd+d launch --location=hsplit
map cmd+shift+d launch --location=vsplit

# 移動（Vim風）
map cmd+h neighboring_window left
map cmd+j neighboring_window down
map cmd+k neighboring_window up
map cmd+l neighboring_window right

# 閉じる
map cmd+w close_window

# ===== カラーテーマ =====
include tokyonight.conf

# 背景画像
include background_pinkerton.conf
