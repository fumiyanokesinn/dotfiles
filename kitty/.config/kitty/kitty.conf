# ===== 基本 =====
shell /opt/homebrew/bin/fish
font_family      JetBrainsMono Nerd Font
font_size        14.0

adjust_line_height 110%
adjust_column_width 100%

# ===== 見た目 =====
background_opacity 0.88
dynamic_background_opacity yes

enable_audio_bell no
visual_bell_duration 0.0

cursor_shape beam
cursor_blink_interval 0
cursor_beam_thickness 1.5
cursor #c0caf5
cursor_text_color #1a1b26

selection_foreground #c0caf5
selection_background #33467c

inactive_text_alpha 0.7

# ===== タブバー =====
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style round

tab_title_template "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

tab_bar_min_tabs 1
tab_bar_margin_width 6
tab_bar_margin_height 4 4

active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #a9b1d6
inactive_tab_background #24283b

# ===== スクロール =====
scrollback_lines 20000
wheel_scroll_multiplier 4.0
touch_scroll_multiplier 1.0

# ===== コピー =====
copy_on_select yes
clipboard_control write-clipboard read-clipboard write-primary read-primary

# ===== パフォーマンス =====
repaint_delay 6
input_delay 1
sync_to_monitor yes
enable_ligatures always

# ===== レイアウト =====
enabled_layouts splits
window_margin_width 6
window_padding_width 6
single_window_margin_width 0
single_window_padding_width 10

window_border_width 1pt
active_border_color #7aa2f7
inactive_border_color #3b4261

# ===== キーバインド =====
# 新しいタブ
map cmd+t new_tab

# タブ切り替え
map cmd+] next_tab
map cmd+[ previous_tab

# 分割
map cmd+d launch --location=hsplit
map cmd+shift+d launch --location=vsplit

# 移動（Vim風）
map cmd+h neighboring_window left
map cmd+j neighboring_window down
map cmd+k neighboring_window up
map cmd+l neighboring_window right

# 行全削除
map cmd+backspace send_text all \x15

# 閉じる
map cmd+w close_window

# スクロール
map cmd+up scroll_line_up
map cmd+down scroll_line_down
map cmd+shift+up scroll_half_page_up
map cmd+shift+down scroll_half_page_down
map cmd+shift+home scroll_home
map cmd+shift+end scroll_end
map cmd+f show_scrollback

# ===== ウィンドウ装飾 =====
hide_window_decorations titlebar-only
background_blur 20

# ===== URL =====
url_style curly
url_color #7dcfff
detect_urls yes

# ===== カラーテーマ =====
include tokyonight.conf

# 背景画像（無効化）
# include background_pinkerton.conf
